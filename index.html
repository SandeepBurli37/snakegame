<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Snake Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #f7f7f7;\n            font-family: Arial, sans-serif;\n        }\n        canvas {\n            border: 5px solid #333;\n            background-color: #ffffff;\n        }\n        .game-over {\n            position: absolute;\n            top: 40%;\n            left: 50%;\n            transform: translate(-50%, -50%);\n            font-size: 2rem;\n            color: #ff4d4d;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="gameCanvas" width="400" height="400"></canvas>\n    <div class="game-over" id="gameOver" style="display:none;">Game Over</div>\n    <script>\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n        let snake = [{ x: 10, y: 10 }];\n        let food = { x: 15, y: 15 };\n        let dx = 1;\n        let dy = 0;\n        let gameOver = false;\n\n        function main() {\n            if (gameOver) return;\n            setTimeout(function () {\n                ctx.clearRect(0, 0, canvas.width, canvas.height);\n                drawSnake();\n                drawFood();\n                moveSnake();\n                main();\n            }, 100);\n        }\n\n        function drawSnake() {\n            for (let part of snake) {\n                ctx.fillStyle = '#4CAF50';\n                ctx.fillRect(part.x * 20, part.y * 20, 18, 18);\n                ctx.strokeStyle = '#333';\n                ctx.strokeRect(part.x * 20, part.y * 20, 18, 18);\n            }\n        }\n\n        function drawFood() {\n            ctx.fillStyle = '#FF5722';\n            ctx.fillRect(food.x * 20, food.y * 20, 18, 18);\n        }\n\n        function moveSnake() {\n            const head = { x: snake[0].x + dx, y: snake[0].y + dy };\n            snake.unshift(head);\n            if (head.x === food.x && head.y === food.y) {\n                placeFood();\n            } else {\n                snake.pop();\n            }\n            if (isGameOver()) {\n                gameOver = true;\n                document.getElementById('gameOver').style.display = 'block';\n            }\n        }\n\n        function placeFood() {\n            food.x = Math.floor(Math.random() * (canvas.width / 20));\n            food.y = Math.floor(Math.random() * (canvas.height / 20));\n        }\n\n        function isGameOver() {\n            return (snake[0].x < 0 || snake[0].x >= canvas.width / 20 ||\n                    snake[0].y < 0 || snake[0].y >= canvas.height / 20 ||\n                    snake.slice(1).some(part => part.x === snake[0].x && part.y === snake[0].y));\n        }\n\n        document.addEventListener('keydown', function (event) {\n            switch (event.key) {\n                case 'ArrowUp': \n                    if (dy === 0) { dx = 0; dy = -1; }\n                    break;\n                case 'ArrowDown': \n                    if (dy === 0) { dx = 0; dy = 1; }\n                    break;\n                case 'ArrowLeft': \n                    if (dx === 0) { dx = -1; dy = 0; }\n                    break;\n                case 'ArrowRight': \n                    if (dx === 0) { dx = 1; dy = 0; }\n                    break;\n            }\n        });\n\n        main();\n    </script>\n</body>\n</html>
